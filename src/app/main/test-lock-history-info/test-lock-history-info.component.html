<section class="text-center">
    <!-- <h3>QR CODE</h3> -->


    <!-- <div class="text-center mt-5">
        <button class="close-btn" (click)="closemodel()">close</button>
    </div> -->
    <mat-dialog-header>
        <h4 class="mb-0"> IOT Device : {{data.lockNumber}}</h4>
        <button type="button" class="btn-close" (click)="closemodel()"></button>
    </mat-dialog-header>
    <mat-dialog-content class="text-center history">
        <form [formGroup]="HistoryForm">
            <div class="row noMarginmatField">
                <div class="col-md-3">
                    <app-date [label]="'From Date'" formControlName="fromDate"></app-date>
                </div>
                <div class="col-md-3">
                    <app-date [label]="'To Date'" formControlName="toDate"></app-date>
                </div>

                <div class="col-md-3">
                    <app-select-dropdown [config]="rideStatusDropdown" formControlName="rideStatus" [items]="rideData"
                        [selectAllCheck]="selectAllRide" (selectionChange)="getRideStatus($event)">
                    </app-select-dropdown>
                </div>
                <div class="col-md-3">
                    <app-select-dropdown [config]="historyStatusDropdown" formControlName="historyStatus"
                        [items]="historyData">
                    </app-select-dropdown>
                </div>
                <div class="col-md-3 mt-4">
                    <app-select-dropdown [config]="rowCountDropdown" formControlName="rowCount" [items]="rowCountData">
                    </app-select-dropdown>
                </div>
                <div class="col-md-3 mt-4">
                    <app-select-dropdown [config]="sortControlDropdown" formControlName="sort"
                        [items]="sortControlData">
                    </app-select-dropdown>
                </div>
                <div class="col-md-12 text-end mt-3">
                    <app-button [label]="'Search'" [class]="'btn btn-primary'" (click)="submit()">
                    </app-button>
                </div>
            </div>
        </form>


        <div class="row">

            <app-table [cols]="cols" [data]="tableData" [excelName]="'History lock'"></app-table>

        </div>


    </mat-dialog-content>
    <!-- <mat-card-content class="card-body p-0">  -->
    <!-- <app-table [cols]="cols" [data]="tableData" [excelName]="'test lock'"></app-table> -->
    <!-- </mat-card-content> -->
</section>
