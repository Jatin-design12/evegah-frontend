<!-- Login Main Section Strat -->
<section class="main">
  <div class="container-fluid">
    <div class="row col-class">
      <div class="col-md-6 col-first">
        <div class="session_container front">
          <!-- Card start -->
          <div class="form-div-sec">
            <figure>
              <img src="../../../assets/images/login-bg.svg" alt="login">
            </figure>
          </div>
          <!-- Card end -->
          <!-- Footer copyright text -->
          <!-- <div class="copyright">
            Copyright © 2021 Kritin Digital Solutions All rights reserved.
          </div> -->
        </div>
      </div>
      <div class="col-md-6 ps-0">
        <div class="session_container front">
          <!-- Card start -->
          <div class="form-div">
            <!-- heading -->
            <h1 class="heading">Reset Password</h1>
            <!-- form start -->
            <form [formGroup]="resetPasswordForm">
              <div class="row">
                <div class="col-sm-12 mb-4">
                  <label class="mb-2" for="fname">Enter Registered Email ID*</label><br>
                  <input type="text" id="fname" name="fname" formControlName="emailId"
                    placeholder="Registered Email ID">
                </div>
                <div class="col-sm-12 pt-3 text-center">
                  <!-- <app-button [label]="'Submit'" [class]="'btn btn-primary'" type="submit">
                  </app-button> -->
                  <button type="submit" class="btn-login" (click)="onResetPassword()">Submit</button>
                </div>
                <div class="col-sm-12 mt-3 text-end">
                  <a class="link" [routerLink]="['/login']">Back To Login</a>
                </div>
              </div>
            </form>
            <!-- form end -->
          </div>
          <!-- Card end -->
        </div>
      </div>
    </div>
  </div>
</section>
<!-- Login Main Section End -->
