<section class="login-page">
  <video autoplay muted loop playsinline class="back-video" aria-hidden="true">
    <source src="../../../assets/images/Plexus - 31503.mp4" type="video/mp4">
  </video>

  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="login-shell">
    <div class="brand-panel">
      <div class="brand-chip">Admin Dashboard</div>
      <h1>Manage EV operations with confidence</h1>
      <p>
        One secure place to monitor activity, control workflows, and keep your team in sync.
      </p>
    </div>

    <div class="login-card" role="region" aria-label="Login form">
      <div class="logo-wrap">
        <img *ngIf="isClient" src="../../../assets/images/company-logo.png" alt="Company logo">
        <img *ngIf="!isClient" src="../../../assets/images/company-logo.png" alt="Company logo">
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Please sign in to continue</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="field-group">
          <label for="emailId">Email</label>
          <input
            class="form-input"
            type="email"
            id="emailId"
            formControlName="emailId"
            placeholder="Enter registered email"
            autocomplete="username"
          >
          <small class="error-text" *ngIf="loginForm.get('emailId')?.touched && loginForm.get('emailId')?.invalid">
            Please enter a valid email address.
          </small>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input
            class="form-input"
            type="password"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <small class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            Password is required.
          </small>
        </div>

        <div class="action-row">
          <a class="link-reset" [routerLink]="['/resetPassword']">Reset Password</a>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>
    </div>
  </div>
</section>

<!-- Login Main Section End -->
