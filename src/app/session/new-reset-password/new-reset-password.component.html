 <!-- New Password Main Section Start -->
<section class="main">
  <video autoplay muted loop plays-inline class="back-video">
    <source src="../../../assets/images/Plexus - 31503.mp4" type="video/mp4">
  </video>
  <div class="container-fluid">
    
    <div class="row">
      
      <div class="col-md-12 formReset">
        <div class="session_container front">

          <!-- Card start -->
          <div class="form-div">
        <button class="close" (click)="gotoAdmin()"> <mat-icon>close</mat-icon></button>

            <!-- heading -->
            <h1 class="heading">RESET PASSWORD</h1>
            <!-- form start -->
            <form [formGroup]="newResetPasswordForm">
              <div class="row">
                <div class="col-sm-12">
                  <app-password [label]="'New Password'"  formControlName="newPassword"> </app-password>
                </div>
                <div class="col-sm-12">
                  <app-password [label]="'Confirm Password '"  formControlName="confirmPassword"> </app-password>
                </div>
                <div class="col-sm-12 pt-3 text-center">
                  <app-button [label]="'Submit'"  [class]="'btn btn-primary'" type="submit" (onClick)="resetPassword()">
                  </app-button>
                </div>
              </div>
            </form>
            <!-- form end -->
          </div>
          <!-- Card end -->
          <!-- Footer copyright text -->
          <div class="copyright">
            Copyright © 2026 Evegah Mobility Pvt Ltd. All rights reserved.
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
 <!-- New Password Main Section End -->
