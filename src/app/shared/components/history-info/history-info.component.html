<section class="text-center" >

        <button class="close-btn" (click)="closemodel()">close</button>

    <mat-dialog-header>
        <h4 class="mb-0">{{data.lockNumber}}</h4>
        <button type="button" class="btn-close" (click)="closemodel()"></button>
    </mat-dialog-header>
    <mat-dialog-content class="text-center"> 
        <form [formGroup]="HistoryForm"> 
            <div class="row noMarginmatField"> 
                <div class="col-md-3">
                    <app-date [label]="'From Date'" formControlName="fromDate"></app-date>
                </div>
                <div class="col-md-3">
                    <app-date [label]="'To Date'" formControlName="toDate" ></app-date>
                </div>
               
                <div class="col-md-3">
                    <app-select-dropdown [config]="rideStatusDropdown" formControlName="rideStatus" [items]="rideData">
                    </app-select-dropdown>
                </div>
                <div class="col-md-3">
                   <app-select-dropdown [config]="historyStatusDropdown" formControlName="historyStatus" [items]="historyData">
                   </app-select-dropdown>
               </div>
                <div class="col-md-12 text-end mt-3">
                    <app-button [label]="'Search'" [class]="'btn btn-primary'" (click)="submit()">
                    </app-button>
                </div>
            </div> 
    </form>
        
        <!-- <h4 class="mt-1 mb-0">{{data.lockNumber}}</h4>
         -->
<mat-card >
    <app-table [cols]="cols" [data]="tableData" [excelName]="'History IOT Device '"></app-table>

</mat-card>

    </mat-dialog-content>

</section>
