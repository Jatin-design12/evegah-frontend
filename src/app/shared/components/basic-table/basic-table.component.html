<div class="table_main_div">
  <!--  sub header start-->

  <!--  sub header end-->
  <!-- grid table start -->
  <div class="mainTable">
    <table mat-table matSort [dataSource]="dataSource" [ngClass]="showSearch ? 'openSearch' : ''"
      class="Data_table table-striped">
      <ng-container *ngFor="let col of tableCols; let i = index" [matColumnDef]="col.key">
        <!-- thead start-->
        <th mat-header-cell *matHeaderCellDef class="{{col.key}}">
          <span *ngIf="col.key !== 'select'" [disabled]="!col.sort" [mat-sort-header]>
            {{ tableCols[i]["display"] }}
          </span>
          <ng-container *ngIf="col.sort&&!col.hidden && showSearch">
            <div>
              <input matInput class="form-field filtersearch" type="text"
                (keyup)="filterData(col.key,$event.target.value)" placeholder="Search">
            </div>
          </ng-container>
          <ng-container *ngIf="col.key === 'select'">
        <th mat-header-row>
          <mat-checkbox (change)="$event ? masterToggle() : null" [checked]="selection.hasValue() && isAllSelected()"
            [indeterminate]="selection.hasValue() && !isAllSelected()" [aria-label]="checkboxLabel()">
          </mat-checkbox>
        </th>
      </ng-container>
      </th>

      <!-- thead end-->
      <!-- tbody start-->
      <td mat-cell *matCellDef="let element ;let j =index" class="{{col.key}}" (click)="rowClickEvent(element)">
        <ng-container *ngIf="col.key === 'select'">
          <mat-checkbox (click)="checkboxSelect(element)" (change)="$event ? selection.toggle(element) : null"
            [checked]="selection.isSelected(element)" [aria-label]="checkboxLabel(element  )">
          </mat-checkbox>
        </ng-container>
        <!--  Checking if it's a normal column or column with specific config -->
        <ng-container *ngIf="!col.config; else hasConfig">
          <span>
            {{ element[col.key] }}
          </span>
        </ng-container>
        <!-- If this column has a config object so we will display depending on our sitted config -->
        <ng-template #hasConfig>
          <!-- if this attribute is a boolean, we will show values from config object depending on his state -->
          <!-- Index -->
          <ng-container *ngIf="col.config.isIndex">
            {{j+1}}
          </ng-container>
          <!-- if this attribute is a date, we will format it depending on format value in config object -->
          <ng-container *ngIf="col.config.isDate">
            {{ element[col.key] | date: col.config.format }}
          </ng-container>
          <ng-container *ngIf="col.config.isTime">
            {{ element[col.key] | date: col.config.format }}
          </ng-container>
          <!--  to access inner data -->
          <ng-container *ngIf="col.config.isInner">
            {{ element[col.key][col.config.innerKey]}}
          </ng-container>

          <!-- to show status -->
          <ng-container *ngIf="col.config.isStatus">

            <span [ngClass]="element[col.key] === 'Active' ? 'active' : 'inActive'"> {{ element[col.key] }} </span>
          </ng-container>


          <!--  to  show image -->
          <!-- <ng-container *ngIf="col.config.isImage">
            <img *ngIf="element[col.key] !==null" [src]="element[col.key]" class="imageClass"
              alt="./assets/images/paf-logo.png" />
            <img *ngIf="element[col.key] === null" src="./assets/images/no-image.png" class="imageClass"
              alt="./assets/images/paf-logo.png" />
          </ng-container> -->

          <!--  to  show image -->
          <ng-container *ngIf="col.config.trueFalseAction">
            <mat-slide-toggle [checked]="element[col.key]" (click)="actionHandler(action,element)"></mat-slide-toggle>
          </ng-container>

          <!-- draft -->
          <ng-container *ngIf="col.config.checkDraft">
            {{ element[col.key] }}
            <!-- {{element[col.config.parameterName]}} -->
            <span *ngIf="element[col.config.parameterName]" class="draft text-danger"> (Draft) </span>
          </ng-container>

          <!--  to show pdf -->
          <span *ngIf="col.config.isPdf && col.config.isClickAble " (click)="pdf(element)">
            <!-- <img src="./assets/images/pdf-logo.png" class="imageClass" alt="'image'" class="imageClass pointer"/> -->
            <button class="btn btn-primary">
              <span>Print</span>
            </button>
          </span>

          <!--  to  show image -->
          <ng-container *ngIf="col.config.isImage && !col.config.isClickAble ">
            <img *ngIf="element[col.key] !==null" [src]="element[col.key]" class="imageClass"
              alt="./assets/images/paf-logo.png" />
            <img *ngIf="element[col.key] === null" src="../../../../assets/images/Noimage.jpg" class="imageClass"
              alt="image" />
          </ng-container>

          <!--QR image code  (click)="rowClickEvent(element)"-->
          <span *ngIf=" col.config.isImage && col.config.isClickAble " (click)="actionHandler(action,element)"
            class="texthead">
            <img *ngIf="element[col.key] !==null" [src]="element[col.key]" class="imageClass pointer"
              alt="./assets/images/paf-logo.png" />
            <img *ngIf="element[col.key] === null" src="../../../../assets/images/Noimage.jpg" class="imageClass"
              alt="image" />
            <!-- <p>test</p> -->
          </span>

          <!-- if this column is action, we will loop through each action and show it as a mat-button -->
          <ng-container *ngIf="col.config.isAction">
            <!-- <button *ngFor="let action of col.config.actions" (click)="emitter.emit(action)" mat-button>{{action}}</button> -->
            <button mat-icon-button *ngFor="let action of col.config.actions" class="{{action}} actionBtn"
              (click)="actionHandler(action,element)">
              <mat-icon fontSet="material-icons-outlined" class="icon-edit"><span>{{action}}</span></mat-icon>
            </button>
          </ng-container>
          <ng-container *ngIf="col.config.isbutton && element.locationData">
            <!-- <button *ngFor="let action of col.config.actions" (click)="emitter.emit(action)" mat-button>{{action}}</button> -->
            <button *ngFor="let action of col.config.actions" class="btn btn-success"
              (click)="actionHandler(action,element)">
              <span *ngIf="element.locationData">{{action}} </span>
            </button>
          </ng-container>
          <ng-container *ngIf="col.config.isbutton && element.locationData === false">
            <button *ngFor="let action of col.config.actions" class="btn btn-default uclocated">
              Locate
            </button>
          </ng-container>
        </ng-template>
      </td>
      <!-- tbody end-->
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="keys; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: keys"></tr>
    </table>
    <div *ngIf="!data.length" class="text-center no_data">
      <h5 class="mb-0">No Record Found</h5>
    </div>
    <!-- pagination start -->
    <!-- <mat-paginator [hidden]="!data.length" [pageSizeOptions]="[7, 25, 100]" showFirstLastButtons
      class="mat-paginator-sticky pagination_set">
    </mat-paginator> -->
    <!-- pagination end -->
  </div>
  <!-- grid table end -->
</div>
